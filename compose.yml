services:
  discord-calendar-bot:
    image: ghcr.io/iniwa/discord-gemini-assist-calender:latest
    container_name: discord-calendar-bot
    restart: unless-stopped
    volumes:
      - /home/iniwa/docker/discord-calendar/data:/data
    environment:
      - DISCORD_BOT_TOKEN=
      - TARGET_CHANNEL_ID=
      - GEMINI_API_KEY=
      # サービスアカウントのJSONキー内容を1行で設定 (改行は\nに変換)
      - GOOGLE_CREDENTIALS_JSON=
      # 対象カレンダーのID (メインカレンダーならGoogleアカウントのメールアドレス)
      - CALENDAR_ID=primary
    user: "1000:1000"
